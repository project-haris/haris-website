[project]
site_name = "Haris Maritime Edge Docs"
site_url = "https://haris.oversight.ee/"
site_description = "Documentation for Haris, a secure maritime edge telemetry platform for vessel data collection, Signal K normalization, and M-SOC integration."
site_author = "Project Haris"
docs_dir = "docs"
repo_url = "https://github.com/project-haris/haris.ahmdngi.io"
extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js"]
nav = [
  {"Overview" = "index.md"},
  {"Architecture" = "architecture.md"},
  {"Watchtower" = "watchtower.md"},
  {"Deployment" = "deployment.md"},
  {"Security" = "security.md"},
  {"Repos" = "repos.md"},
  {"FAQ" = "faq.md"},
]

[project.theme]
language = "en"
custom_dir = "overrides"
features = [
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "content.code.copy",
  "search.suggest",
  "search.highlight",
]
palette = { scheme = "slate", primary = "custom", accent = "custom" }

[project.extra]
generator = false
